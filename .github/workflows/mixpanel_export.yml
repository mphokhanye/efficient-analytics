name: Mixpanel Data Export

on:
  # Run manually from the Actions tab
  workflow_dispatch:
    inputs:
      from_date:
        description: "Start date (YYYY-MM-DD)"
        required: true
        default: "2026-03-28"
      to_date:
        description: "End date (YYYY-MM-DD)"
        required: true
        default: "2026-04-28"

  # Optional: run on a schedule (every Monday at 7am UTC)
  # schedule:
  #   - cron: "0 7 * * 1"

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run Mixpanel export
        env:
          MIXPANEL_API_SECRET: ${{ secrets.MIXPANEL_API_SECRET }}
          FROM_DATE: ${{ github.event.inputs.from_date }}
          TO_DATE: ${{ github.event.inputs.to_date }}
        run: python mixpanel_export.py

      - name: Upload CSV as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mixpanel-export-${{ github.event.inputs.from_date }}-to-${{ github.event.inputs.to_date }}
          path: mixpanel_export.csv
          retention-days: 30
