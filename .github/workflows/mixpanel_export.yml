name: Mixpanel Export

on:
  workflow_dispatch:

jobs:
  run-export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Mixpanel Export
        env:
          MIXPANEL_API_SECRET: ${{ secrets.MIXPANEL_API_SECRET }}
          FROM_DATE: 2026-03-28
          TO_DATE: 2026-04-28
        run: python your_script_name.py

      - name: Upload CSV output
        uses: actions/upload-artifact@v4
        with:
          name: mixpanel-data
          path: mixpanel_export.csv
